name: Sync from Upstream (Test)

# Test version of sync_from_upstream.yaml — identical logic but pushes to a
# staging branch instead of main so the result can be reviewed before merging.

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream branch or tag to sync from (e.g. main, v2.3.2)'
        required: false
        default: 'main'
      target_branch:
        description: 'Branch to push the sync result to'
        required: false
        default: 'sync-test'

# Uses the org-level PAT secret for checkout so that git push can update
# .github/workflows/ files. GITHUB_TOKEN cannot push workflow file changes;
# a PAT with 'repo' and 'workflow' scopes is required.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout template repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Fetch upstream and prepare target branch
        run: |
          # Save the current template HEAD so we can restore template-specific
          # files after the reset.
          echo "TEMPLATE_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

          git remote add upstream https://github.com/revisit-studies/study.git
          UPSTREAM_REF="${{ github.event.inputs.upstream_ref }}"
          git fetch -- upstream "${UPSTREAM_REF:-main}"
          UPSTREAM_SHA=$(git rev-parse FETCH_HEAD)
          echo "UPSTREAM_SHA=$UPSTREAM_SHA" >> "$GITHUB_ENV"
          echo "Syncing from upstream @ $UPSTREAM_SHA"

          # Create (or reset) the target branch from current HEAD before resetting,
          # so the branch exists for the subsequent force push.
          TARGET_BRANCH="${{ github.event.inputs.target_branch }}"
          TARGET_BRANCH="${TARGET_BRANCH:-sync-test}"
          git check-ref-format --branch "$TARGET_BRANCH"
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> "$GITHUB_ENV"
          git checkout -B "$TARGET_BRANCH"

          # Reset the working tree to exactly match upstream. This handles
          # additions, modifications, and deletions in one step, and aligns
          # the branch history so the template is no longer "behind" upstream.
          git reset --hard FETCH_HEAD

      - name: Restore template-specific files
        run: |
          # These files are intentionally different in the template and must
          # be restored from before the reset.
          # Note: public/global.json is handled separately below so the $schema
          # version is always taken from upstream rather than frozen in TEMPLATE_HEAD.
          rm -rf public/tutorial src/public/tutorial
          rm -f \
            .github/workflows/pr_close.yaml \
            .github/workflows/release.yaml \
            .github/workflows/release_github.yaml
          git checkout "$TEMPLATE_HEAD" -- \
            .env \
            README.md \
            .github/workflows/deploy_website.yaml \
            public/README.md \
            public/tutorial \
            src/public/tutorial \
            .github/workflows/sync_from_upstream.yaml \
            .github/workflows/sync_from_upstream_test.yaml

      - name: Reset global.json to template state with upstream schema version
        run: |
          # After the reset, public/global.json is upstream's full study list.
          # Extract only the $schema URL from it, then write back the template
          # version (empty study list) so the schema version always stays current.
          node -e "
            const fs = require('fs');
            const upstream = JSON.parse(fs.readFileSync('public/global.json', 'utf8'));
            const template = { '\$schema': upstream['\$schema'], configsList: [], configs: {} };
            fs.writeFileSync('public/global.json', JSON.stringify(template, null, 2) + '\n');
          "

      - name: Remove study/demo folders not included in template
        run: |
          # Top-level public/: keep shared assets, utilities, and tutorial study assets.
          # All other studies and extras brought in by the reset are removed.
          KEEP_PUBLIC=("libraries" "tutorial" "revisitAssets" "revisitUtilities" "404.html" "vite.svg" "global.json" "README.md")
          for item in public/*; do
            name=$(basename "$item")
            keep=false
            for k in "${KEEP_PUBLIC[@]}"; do
              [[ "$name" == "$k" ]] && keep=true && break
            done
            if [[ "$keep" == false ]]; then
              echo "Removing non-template item: $item"
              rm -rf "$item"
            fi
          done

          # src/public/: keep library React components and tutorial dependencies.
          KEEP_SRC_PUBLIC=("libraries" "tutorial" "example-brush-interactions")
          for item in src/public/*; do
            [[ -e "$item" ]] || continue  # skip if glob matched nothing
            name=$(basename "$item")
            keep=false
            for k in "${KEEP_SRC_PUBLIC[@]}"; do
              [[ "$name" == "$k" ]] && keep=true && break
            done
            if [[ "$keep" == false ]]; then
              echo "Removing non-template item: $item"
              rm -rf "$item"
            fi
          done

          # Root tests/: remove upstream demo/example E2E tests from the template.
          rm -rf tests

      - name: Remove unused dependencies from package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

            // Packages only used in example studies removed from this template.
            const unusedDeps = [
              '@visdesignlab/upset2-react', // UpSet2 example study only
              'topojson-client',            // src/public/demo-choropleth-map/ only
              // MUI packages — not imported anywhere in src/ on dev branch
              '@emotion/react',
              '@emotion/styled',
              '@mui/icons-material',
              '@mui/material',
              '@mui/system',
              '@mui/x-data-grid',
              'recoil',                     // not imported anywhere in src/
            ];
            unusedDeps.forEach((dep) => {
              if (pkg.dependencies && dep in pkg.dependencies) {
                console.log('Removing unused dep:', dep);
                delete pkg.dependencies[dep];
              }
            });

            // devDependencies only needed for removed example studies
            const unusedDevDeps = [
              '@types/topojson-client',        // only for demo-choropleth-map
              '@types/topojson-specification', // only for demo-choropleth-map
            ];
            unusedDevDeps.forEach((dep) => {
              if (pkg.devDependencies && dep in pkg.devDependencies) {
                console.log('Removing unused devDep:', dep);
                delete pkg.devDependencies[dep];
              }
            });

            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Refresh yarn.lock
        run: yarn install --ignore-scripts --non-interactive

      - name: Commit and force push to target branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected — template is already up to date with upstream."
          else
            SHORT_SHA="${UPSTREAM_SHA:0:7}"
            git commit -m "chore: sync from upstream revisit-studies/study@${SHORT_SHA}"
            git push --force -- origin "$TARGET_BRANCH"
            echo "Force-pushed sync commit to $TARGET_BRANCH."
          fi
